name: Clean private example from PR

on:
  pull_request:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/initial-generator'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Replace readable defaults and docs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          old = 'GOAKILLER900 IS GAY'
          new = 'THE FACTORY GROWS!!'
          for filename in ('README.md', 'desktop/app.py', 'desktop/models.py'):
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Replace compressed source bundle
        shell: bash
        run: |
          python - <<'PY'
          import ast
          import base64
          from pathlib import Path
          import zlib
          old = b'GOAKILLER900 IS GAY'
          new = b'THE FACTORY GROWS!!'
          path = Path('tools/apply_update_a.py')
          tree = ast.parse(path.read_text(encoding='utf-8'))
          payloads = next(
              ast.literal_eval(node.value)
              for node in tree.body
              if isinstance(node, ast.Assign)
              and any(isinstance(t, ast.Name) and t.id == 'PAYLOADS' for t in node.targets)
          )
          cleaned = {}
          for name, encoded in payloads.items():
              raw = zlib.decompress(base64.b64decode(encoded)).replace(old, new)
              cleaned[name] = base64.b64encode(zlib.compress(raw, 9)).decode()
          path.write_text(
              "from __future__ import annotations\n"
              "import base64\nimport zlib\nfrom pathlib import Path\n\n"
              f"PAYLOADS = {cleaned!r}\n\n"
              "for relative_path, encoded in PAYLOADS.items():\n"
              "    path = Path(relative_path)\n"
              "    path.parent.mkdir(parents=True, exist_ok=True)\n"
              "    path.write_bytes(zlib.decompress(base64.b64decode(encoded)))\n"
              "    print(f'wrote {path}')\n",
              encoding='utf-8',
          )
          PY

      - name: Patch browser-loaded default
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old_line = '  const html = await new Response(stream).text();'
          new_lines = (
              '  const legacyExample = ["GOAKILLER900", "IS", "GAY"].join(" ");\n'
              '  const html = (await new Response(stream).text())\n'
              '    .replaceAll(legacyExample, "THE FACTORY GROWS!!");'
          )
          if old_line in text:
              text = text.replace(old_line, new_lines)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md desktop/app.py desktop/models.py tools/apply_update_a.py index.html
          if git diff --cached --quiet; then
            echo "Nothing left to clean"
          else
            git commit -m "Replace private joke example"
            git push origin HEAD:${{ github.head_ref }}
          fi
