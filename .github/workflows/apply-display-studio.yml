name: Apply Display Studio source bundle

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/display-studio-features'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Reassemble and verify tested source bundle
        shell: bash
        run: |
          echo "e46a476161c7cabed379ce72e0d37a7801f3d9d13a6e2c5c6380f9a17e823501  tools/display-studio-bundle.part00a" | sha256sum --check
          echo "8a4b068e0414e4742b728e6349af4b26afeee88dddcd7c88b76f0c0ec234b1c0  tools/display-studio-bundle.part00b" | sha256sum --check
          cat tools/display-studio-bundle.part00a tools/display-studio-bundle.part00b > /tmp/display-studio.b64
          for part in 01 02 03 04; do
            file="tools/display-studio-bundle.part${part}"
            test "$(wc -c < "$file")" -ge 6000
            head -c 6000 "$file" >> /tmp/display-studio.b64
          done
          file="tools/display-studio-bundle.part05"
          test "$(wc -c < "$file")" -ge 1752
          head -c 1752 "$file" >> /tmp/display-studio.b64
          echo "fa98bbfd6023503eb84a9df098dfcb8f900898d5985f169d0deacf3e61f0a996  /tmp/display-studio.b64" | sha256sum --check
          base64 --decode /tmp/display-studio.b64 > /tmp/display-studio.tar.gz
          echo "86d029ac63b7c836062b4d22dffe172bd9f40149e4aa47a79b23cb0ae0358a46  /tmp/display-studio.tar.gz" | sha256sum --check
          tar -xzf /tmp/display-studio.tar.gz -C .

      - name: Run desktop unit tests
        run: python -m unittest discover -s desktop/tests -v

      - name: Run CLI unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python source
        run: python -m compileall -q desktop generator.py

      - name: Verify advanced CLI generation
        shell: bash
        run: |
          python generator.py "HELLO WORLD" \
            --mode lamp-static \
            --width 32 \
            --height 16 \
            --pixel-width 2 \
            --pixel-height 3 \
            --layout compact-square \
            --output /tmp/display-studio-blueprint.txt
          test -s /tmp/display-studio-blueprint.txt

      - name: Remove temporary transfer files
        shell: bash
        run: |
          rm -f tools/display-studio-bundle.part0*
          rm -f tools/display-studio-update.part00
          rm -f tools/.display-studio-branch
          rm -f .github/workflows/apply-display-studio.yml

      - name: Commit tested feature source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Display Studio features" || exit 0
          git push origin HEAD:${{ github.head_ref }}
