name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run generator tests
        run: python -m unittest discover -s tests -v

      - name: Show packed browser scroll implementation
        shell: bash
        run: |
          node <<'JS'
          const fs = require('fs');
          const zlib = require('zlib');
          const index = fs.readFileSync('index.html', 'utf8');
          const match = index.match(/const payload = "([A-Za-z0-9+/=]+)";/);
          if (!match) throw new Error('Browser payload not found');
          const html = zlib.inflateSync(Buffer.from(match[1], 'base64')).toString('utf8');
          const lines = html.split('\n');
          for (let i = 0; i < lines.length; i++) {
            if (/visible.*frame|step \* column|direction.*left.*right/i.test(lines[i])) {
              console.log(`--- context around line ${i + 1} ---`);
              console.log(lines.slice(Math.max(0, i - 5), Math.min(lines.length, i + 8)).join('\n'));
            }
          }
          JS

      - name: Check browser JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          html = Path("index.html").read_text(encoding="utf-8")
          match = re.search(r"<script>(.*?)</script>", html, re.DOTALL)
          if not match:
              raise SystemExit("No inline script found")
          Path("/tmp/app.js").write_text(match.group(1), encoding="utf-8")
          PY
          node --check /tmp/app.js
