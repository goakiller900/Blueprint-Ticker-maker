name: Build desktop application

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test generator
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run desktop tests
        run: python -m unittest discover -s desktop/tests -v

      - name: Compile Python source
        run: python -m compileall -q desktop

  build:
    name: Build ${{ matrix.artifact }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: BlueprintTickerMaker-Windows-x64
            executable: dist/BlueprintTickerMaker.exe
            package: dist/BlueprintTickerMaker-Windows-x64.zip
            test_command: './dist/BlueprintTickerMaker.exe --self-test'
          - os: ubuntu-latest
            artifact: BlueprintTickerMaker-Linux-x64
            executable: dist/BlueprintTickerMaker
            package: dist/BlueprintTickerMaker-Linux-x64.tar.gz
            test_command: './dist/BlueprintTickerMaker --self-test'
          - os: macos-15
            artifact: BlueprintTickerMaker-macOS-arm64
            executable: dist/BlueprintTickerMaker.app
            package: dist/BlueprintTickerMaker-macOS-arm64.zip
            test_command: './dist/BlueprintTickerMaker.app/Contents/MacOS/BlueprintTickerMaker --self-test'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned build dependency
        run: python -m pip install --disable-pip-version-check -r desktop/requirements-build.txt

      - name: Build standalone application
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name BlueprintTickerMaker
          --paths desktop
          desktop/app.py

      - name: Run bundled self-test
        shell: bash
        run: ${{ matrix.test_command }}

      - name: Package Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/BlueprintTickerMaker.exe -DestinationPath '${{ matrix.package }}'

      - name: Package Linux application
        if: runner.os == 'Linux'
        shell: bash
        run: tar -C dist -czf '${{ matrix.package }}' BlueprintTickerMaker

      - name: Package macOS application
        if: runner.os == 'macOS'
        shell: bash
        run: ditto -c -k --sequesterRsrc --keepParent dist/BlueprintTickerMaker.app '${{ matrix.package }}'

      - name: Upload compiled application
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.package }}
          if-no-files-found: error
          retention-days: 30

  latest-release:
    name: Publish latest automatic build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download compiled packages
        uses: actions/download-artifact@v4
        with:
          path: release-input

      - name: Collect release files and create checksums
        shell: bash
        run: |
          mkdir -p release
          find release-input -type f -exec cp {} release/ \;
          unzip -j release/BlueprintTickerMaker-Windows-x64.zip BlueprintTickerMaker.exe -d release
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Replace rolling latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --yes --cleanup-tag >/dev/null 2>&1 || true
          gh release create latest release/* \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Latest automatic build" \
            --notes "Automatically built from the latest successful commit on main. This rolling release is replaced whenever main builds successfully."

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download compiled packages
        uses: actions/download-artifact@v4
        with:
          path: release-input

      - name: Collect packages and create checksums
        shell: bash
        run: |
          mkdir -p release
          find release-input -type f -exec cp {} release/ \;
          unzip -j release/BlueprintTickerMaker-Windows-x64.zip BlueprintTickerMaker.exe -d release
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi
